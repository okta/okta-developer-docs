<svg xmlns="http://www.w3.org/2000/svg" width="940" height="760" viewBox="0 0 940 760" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <title>Advanced posture check and custom remediation sign-in flow</title>
  <desc>Sequence diagram showing a user signing in, Okta evaluating a device assurance policy, Okta Verify running a custom OSQuery check on the device, and the Sign-In Widget showing custom remediation instructions when the device fails the check.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#1662dd"/>
    </marker>
    <marker id="arrowReturn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#5a5a5a"/>
    </marker>
  </defs>

  <style>
    .actorBox { fill:#eef3fb; stroke:#1662dd; stroke-width:1.5; rx:6; }
    .actorText { fill:#0f2c5c; font-weight:bold; text-anchor:middle; }
    .lifeline { stroke:#b9c4d4; stroke-width:1.5; stroke-dasharray:4 4; }
    .req { stroke:#1662dd; stroke-width:1.5; }
    .ret { stroke:#5a5a5a; stroke-width:1.5; stroke-dasharray:5 4; }
    .msg { fill:#1d2733; text-anchor:middle; }
    .self { fill:#1d2733; }
    .selfbox { fill:#f4f7fc; stroke:#9bb1d6; stroke-width:1; }
    .altframe { fill:none; stroke:#c2a33a; stroke-width:1.25; }
    .altlabel { fill:#7a5d00; font-weight:bold; font-size:11px; }
    .altbar { fill:#f6eccb; stroke:#c2a33a; stroke-width:1; }
    .pass { fill:#1f7a3d; font-weight:bold; }
    .fail { fill:#b3261e; font-weight:bold; }
  </style>

  <!-- Actor headers -->
  <g>
    <rect class="actorBox" x="30"  y="20" width="150" height="38" rx="6"/>
    <text class="actorText" x="105" y="44">User (macOS device)</text>

    <rect class="actorBox" x="300" y="20" width="120" height="38" rx="6"/>
    <text class="actorText" x="360" y="44">App</text>

    <rect class="actorBox" x="540" y="20" width="120" height="38" rx="6"/>
    <text class="actorText" x="600" y="44">Okta</text>

    <rect class="actorBox" x="770" y="20" width="140" height="38" rx="6"/>
    <text class="actorText" x="840" y="44">Okta Verify</text>
  </g>

  <!-- Lifelines -->
  <line class="lifeline" x1="105" y1="58" x2="105" y2="730"/>
  <line class="lifeline" x1="360" y1="58" x2="360" y2="730"/>
  <line class="lifeline" x1="600" y1="58" x2="600" y2="730"/>
  <line class="lifeline" x1="840" y1="58" x2="840" y2="730"/>

  <!-- 1. User -> App -->
  <line class="req" x1="105" y1="100" x2="358" y2="100" marker-end="url(#arrow)"/>
  <text class="msg" x="231" y="92">1. Access protected app</text>

  <!-- 2. App -> Okta -->
  <line class="req" x1="360" y1="140" x2="598" y2="140" marker-end="url(#arrow)"/>
  <text class="msg" x="480" y="132">2. Redirect to sign in</text>

  <!-- 3. Okta self: evaluate policy -->
  <path class="ret" d="M600,176 h70 v26 h-68" fill="none" stroke="#1662dd" stroke-dasharray="0" marker-end="url(#arrow)"/>
  <rect class="selfbox" x="612" y="180" width="300" height="20" rx="3"/>
  <text class="self" x="620" y="194">3. Evaluate app sign-in policy + device assurance</text>

  <!-- 4. Okta -> Okta Verify -->
  <line class="req" x1="600" y1="248" x2="838" y2="248" marker-end="url(#arrow)"/>
  <text class="msg" x="719" y="240">4. Request device posture</text>

  <!-- 5. Okta Verify self: run OSQuery -->
  <path d="M840,284 h60 v26 h-58" fill="none" stroke="#1662dd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect class="selfbox" x="612" y="288" width="300" height="20" rx="3"/>
  <text class="self" x="620" y="302">5. Run osquery custom check on device</text>

  <!-- 6. Okta Verify -> Okta (return) -->
  <line class="ret" x1="840" y1="346" x2="602" y2="346" marker-end="url(#arrowReturn)"/>
  <text class="msg" x="721" y="338">6. Return check result (for example, 1)</text>

  <!-- 7. Okta self: compare -->
  <path d="M600,382 h70 v26 h-68" fill="none" stroke="#1662dd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect class="selfbox" x="612" y="386" width="300" height="20" rx="3"/>
  <text class="self" x="620" y="400">7. Compare result to required value</text>

  <!-- alt frame -->
  <rect class="altframe" x="70" y="440" width="840" height="250"/>
  <path class="altbar" d="M70,440 h60 v18 l-10,8 h-50 z"/>
  <text class="altlabel" x="80" y="455">alt</text>
  <text class="altlabel" x="135" y="455">[device passes all checks]</text>

  <!-- 8a. pass: Okta -> App -->
  <line class="req" x1="600" y1="492" x2="362" y2="492" marker-end="url(#arrow)"/>
  <text class="msg pass" x="481" y="484">8a. Grant access</text>
  <!-- App -> User access -->
  <line class="req" x1="360" y1="528" x2="107" y2="528" marker-end="url(#arrow)"/>
  <text class="msg pass" x="233" y="520">9a. Open app</text>

  <!-- divider -->
  <line x1="70" y1="556" x2="910" y2="556" stroke="#c2a33a" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="altlabel" x="80" y="572">[device fails a check]</text>

  <!-- 8b. fail: Okta -> User -->
  <line class="req" x1="600" y1="612" x2="107" y2="612" marker-end="url(#arrow)"/>
  <text class="msg fail" x="350" y="604">8b. Deny access; return custom remediation</text>

  <!-- 9b. user self: sees widget -->
  <rect class="selfbox" x="30" y="640" width="360" height="34" rx="3"/>
  <text class="self" x="40" y="655">9b. Sign-In Widget shows custom remediation</text>
  <text class="self" x="40" y="669">message and link from remediationSettings</text>

  <!-- 10b. remediate + retry -->
  <line class="ret" x1="105" y1="704" x2="105" y2="724" stroke="#b3261e"/>
  <text class="msg fail" x="230" y="715">10b. User fixes device and signs in again</text>
</svg>
